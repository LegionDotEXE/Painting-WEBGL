<!-- ColoredPoints.html -->

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>ColoredPoints</title>
  </head>
  <body onload="main()">
    <canvas id="webgl" width="400" height="400">
      Please use a browser that supports "canvas"
    </canvas>
    <br>
    <input type="button" value="Point" onclick="g_selectedType='point'">
    <input type="button" value="Triangle" onclick="g_selectedType='triangle'">
    <input type="button" value="Circle" onclick="g_selectedType='circle'">
    <input type="button" value="Clear Canvas" onclick="clearCanvas()">
    <br>
    <label>R:</label> <input type="range" id="redSlider" min="0" max="100" value="100">
    <label>G:</label> <input type="range" id="greenSlider" min="0" max="100" value="0">
    <label>B:</label> <input type="range" id="blueSlider" min="0" max="100" value="0">
    <br>
    <label>Size:</label> <input type="range" id="sizeSlider" min="1" max="50" value="10">
    <label>Segments:</label> <input type="range" id="segmentSlider" min="3" max="40" value="10">
    <br>
    <p id="numdot"></p>
    <script src="lib/webgl-utils.js"></script>
    <script src="lib/webgl-debug.js"></script>
    <script src="lib/cuon-utils.js"></script>
    <script src="ColoredPoints.js"></script>
  </body>
</html>
